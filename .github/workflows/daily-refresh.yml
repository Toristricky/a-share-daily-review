name: Daily A Share Review Refresh

on:
  workflow_dispatch:
  schedule:
    - cron: "17 11 * * 1-5"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  refresh-and-deploy:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Refresh review data
        run: |
          python refresh_a_share_review.py

      - name: Commit refreshed data
        run: |
          git config user.name "a-share-review-bot"
          git config user.email "actions@github.com"
          git add data 每日A股复盘表.xlsx
          git diff --cached --quiet || git commit -m "daily refresh"
          git push

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
